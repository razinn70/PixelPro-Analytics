name: ETL — Daily Metrics

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC = 2am EST
  workflow_dispatch:       # allow manual trigger

jobs:
  daily-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        run: pip install -r stages/04-backend-build/output/etl/requirements.txt
      - name: Run daily_metrics pipeline
        run: python stages/04-backend-build/output/etl/pipelines/daily_metrics.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HEARTBEAT_URL:        ${{ secrets.ETL_HEARTBEAT_URL }}
