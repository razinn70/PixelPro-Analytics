name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        working-directory: stages/04-backend-build/output/api
      - run: npm run lint
        working-directory: stages/04-backend-build/output/api
      - run: npm test
        working-directory: stages/04-backend-build/output/api

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
        working-directory: stages/04-backend-build/output/api
      - run: npm audit --audit-level=high
        working-directory: stages/04-backend-build/output/api

  audit-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pip-audit
      - run: pip-audit -r stages/04-backend-build/output/etl/requirements.txt
